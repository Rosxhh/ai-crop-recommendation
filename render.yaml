services:
  - type: web
    name: crop-yield-project
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn crop_project.wsgi
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false # User will need to add this manually in Render UI
      - key: DATABASE_URL
        fromDatabase:
          name: crop-db
          property: connectionString

databases:
  - name: crop-db
    plan: free
