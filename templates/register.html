{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AgriCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { --primary: #16a34a; --primary-dark: #15803d; }
        body { font-family: 'Outfit', sans-serif; background: #000; overflow-x: hidden; }
        .auth-background {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover; z-index: -1;
        }
        .auth-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(22, 163, 74, 0.4) 100%);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="auth-background"></div>
    <div class="auth-overlay"></div>

    <div class="glass-card w-full max-w-[480px] p-8 md:p-10 animate__animated animate__fadeInUp">
        
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-seedling text-emerald-600 text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900">Join AgriCore</h1>
            <p class="text-slate-500 font-medium">Start your smart farming journey today</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Full Name</label>
                    <input type="text" name="name" required class="w-full h-12 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-xl px-4 outline-none transition-all font-bold text-slate-700" placeholder="John Doe">
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
                    <input type="email" name="email" required class="w-full h-12 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-xl px-4 outline-none transition-all font-bold text-slate-700" placeholder="john@example.com">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Mobile Number</label>
                    <input type="tel" name="mobile" required class="w-full h-12 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-xl px-4 outline-none transition-all font-bold text-slate-700" placeholder="+91 00000 00000">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Password</label>
                    <input type="password" name="password" required class="w-full h-12 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-xl px-4 outline-none transition-all font-bold text-slate-700" placeholder="••••••••">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full h-14 bg-gradient-to-r from-emerald-600 to-emerald-700 text-white font-black rounded-2xl shadow-lg shadow-emerald-200 hover:translate-y-[-2px] transition-all active:scale-95">
                    Create My Account
                </button>
            </div>
        </form>

        <p class="mt-8 text-center text-sm font-bold text-slate-400">
            Already have an account? <a href="{% url 'login' %}" class="text-emerald-600 hover:underline">Sign In</a>
        </p>
    </div>

</body>
</html>
