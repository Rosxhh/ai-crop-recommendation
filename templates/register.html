{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AgriCore Smart Assistant</title>
    
    <!-- Core Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            overflow-x: hidden;
        }

        .auth-background {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1464226184884-fa280b87c399?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        .auth-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(22, 163, 74, 0.4) 100%);
            z-index: -1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .step-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 12px;
            transition: all 0.4s ease;
        }

        .step-active { background: var(--primary); color: white; box-shadow: 0 0 20px rgba(22, 163, 74, 0.4); }
        .step-inactive { background: #f1f5f9; color: #94a3b8; }
        .step-complete { background: #10b981; color: white; }

        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="auth-background"></div>
    <div class="auth-overlay"></div>

    <!-- Register Card -->
    <div class="glass-card w-full max-w-[500px] p-8 md:p-12">
        
        <!-- Step Indicator -->
        <div class="flex items-center justify-center gap-4 mb-12">
            <div id="step-1-circle" class="step-circle step-active">1</div>
            <div class="h-px w-8 bg-slate-200"></div>
            <div id="step-2-circle" class="step-circle step-inactive">2</div>
            <div class="h-px w-8 bg-slate-200"></div>
            <div id="step-3-circle" class="step-circle step-inactive">3</div>
        </div>

        <form id="registerForm" method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            
            <!-- Step 1: Personal Info -->
            <div id="step-1" class="form-step active">
                <div class="text-center mb-10">
                    <h1 class="text-2xl font-black text-slate-900 mb-2">Create Account</h1>
                    <p class="text-slate-500 font-medium">Join our precision farming network</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Full Name</label>
                        <input type="text" name="name" id="name" required class="w-full h-14 bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-2xl px-6 outline-none transition-all font-bold text-slate-800" placeholder="e.g. John Farmer">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Email Address</label>
                        <input type="email" name="email" id="email" required class="w-full h-14 bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-2xl px-6 outline-none transition-all font-bold text-slate-800" placeholder="farmer@example.com">
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Mobile Number</label>
                        <input type="tel" name="mobile" id="mobile" required class="w-full h-14 bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-2xl px-6 outline-none transition-all font-bold text-slate-800" placeholder="+91 00000 00000">
                    </div>
                </div>

                <button type="button" onclick="goToStep(2)" class="w-full h-16 bg-agri-600 hover:bg-agri-700 text-white font-black rounded-2xl mt-10 transition-all flex items-center justify-center gap-3 shadow-lg shadow-agri-600/20">
                    Next Step <i class="fa-solid fa-arrow-right opacity-50"></i>
                </button>
            </div>

            <!-- Step 2: Verification Simulation -->
            <div id="step-2" class="form-step">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-black text-slate-900 mb-2">Verify Identity</h2>
                    <p id="verify-msg" class="text-slate-500 font-medium">Verification code sent to your mobile</p>
                </div>

                <div class="space-y-8">
                    <div class="flex justify-center gap-3">
                        <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-xl outline-none transition-all">
                        <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-xl outline-none transition-all">
                        <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-xl outline-none transition-all">
                        <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-xl outline-none transition-all">
                    </div>
                    
                    <p class="text-center text-xs font-bold text-slate-400">
                        Didn't receive code? <button type="button" class="text-agri-600 hover:underline">Resend Code</button>
                    </p>
                </div>

                <button type="button" onclick="goToStep(3)" class="w-full h-16 bg-agri-600 hover:bg-agri-700 text-white font-black rounded-2xl mt-10 transition-all flex items-center justify-center gap-3">
                    Verify Code <i class="fa-solid fa-shield-check opacity-50"></i>
                </button>
                <button type="button" onclick="goToStep(1)" class="w-full mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">Go Back</button>
            </div>

            <!-- Step 3: Password & Finish -->
            <div id="step-3" class="form-step">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-black text-slate-900 mb-2">Secure Account</h2>
                    <p class="text-slate-500 font-medium">Create a strong password</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Password</label>
                        <input type="password" name="password" id="password" required oninput="checkStrength(this.value)" class="w-full h-14 bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-2xl px-6 outline-none transition-all font-bold text-slate-800" placeholder="••••••••">
                        <div class="mt-3 flex gap-1">
                            <div id="s-1" class="password-strength bg-slate-200 flex-1"></div>
                            <div id="s-2" class="password-strength bg-slate-200 flex-1"></div>
                            <div id="s-3" class="password-strength bg-slate-200 flex-1"></div>
                            <div id="s-4" class="password-strength bg-slate-200 flex-1"></div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 mb-2">Confirm Password</label>
                        <input type="password" id="confirm_password" required class="w-full h-14 bg-white/50 border-2 border-transparent focus:border-agri-500 rounded-2xl px-6 outline-none transition-all font-bold text-slate-800" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="finalSubmit" class="w-full h-16 bg-agri-600 hover:bg-agri-700 text-white font-black rounded-2xl mt-10 transition-all flex items-center justify-center gap-3">
                    Complete Registration <i class="fa-solid fa-circle-check opacity-50"></i>
                </button>
                <button type="button" onclick="goToStep(2)" class="w-full mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">Go Back</button>
            </div>

        </form>

        <div class="mt-10 text-center">
            <p class="text-sm font-bold text-slate-400">
                Already have an account? <a href="{% url 'login' %}" class="text-agri-600 hover:underline">Sign In</a>
            </p>
        </div>

    </div>

    <script>
        function goToStep(step) {
            // Basic Validation
            if (step === 2) {
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const mobile = document.getElementById('mobile').value;
                if (!name || !email || !mobile) {
                    alert("Please fill all identity fields.");
                    return;
                }
                document.getElementById('verify-msg').innerText = `Verification code sent to ${mobile}`;
            }

            // UI Transitions
            document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');

            // Step Circles
            for (let i = 1; i <= 3; i++) {
                const circle = document.getElementById(`step-${i}-circle`);
                circle.className = 'step-circle';
                if (i < step) circle.classList.add('step-complete');
                else if (i === step) circle.classList.add('step-active');
                else circle.classList.add('step-inactive');
            }
        }

        function checkStrength(p) {
            const levels = [
                document.getElementById('s-1'),
                document.getElementById('s-2'),
                document.getElementById('s-3'),
                document.getElementById('s-4')
            ];
            
            levels.forEach(l => l.className = 'password-strength bg-slate-200 flex-1');
            
            let score = 0;
            if (p.length > 5) score++;
            if (/[A-Z]/.test(p)) score++;
            if (/[0-9]/.test(p)) score++;
            if (/[^A-Za-z0-9]/.test(p)) score++;

            const colors = ['bg-rose-500', 'bg-amber-500', 'bg-yellow-400', 'bg-emerald-500'];
            for (let i = 0; i < score; i++) {
                levels[i].className = `password-strength ${colors[score-1]} flex-1`;
            }
        }

        // OTP Focus Logic
        document.querySelectorAll('.otp-input').forEach((input, index, inputs) => {
            input.oninput = () => {
                if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
            };
            input.onkeydown = (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
            };
        });

        document.getElementById('registerForm').onsubmit = function(e) {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (pass !== confirm) {
                alert("Passwords do not match!");
                e.preventDefault();
                return;
            }
            const btn = document.getElementById('finalSubmit');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Initializing Account...`;
        };
    </script>
</body>
</html>
