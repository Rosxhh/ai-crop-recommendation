{% extends 'base.html' %}

{% block content %}
<div class="relative w-full min-h-screen">

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <!-- Header -->
    <div class="text-center mb-10 animate-[fadeInUp_0.5s_ease-out]">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-emerald-50 text-emerald-600 shadow-xl shadow-emerald-50 p-2 mb-4 border border-emerald-100">
            <i class="fa-solid fa-seedling text-3xl"></i>
        </div>
        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight">Crop Recommendation AI</h2>
        <p class="text-slate-500 mt-3 text-lg">Input soil nutrients and environmental data to discover the most profitable crop for your land.</p>
    </div>

    <!-- Error Alert -->
    {% if error %}
    <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-8 rounded-r-xl shadow-sm animate-[fadeInUp_0.3s_ease-out]">
        <div class="flex items-center">
            <div class="flex-shrink-0"><i class="fa-solid fa-circle-exclamation text-red-500"></i></div>
            <div class="ml-3"><p class="text-sm text-red-700 font-medium">{{ error }}</p></div>
        </div>
    </div>
    {% endif %}

    <!-- Form Card -->
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8 md:p-10 animate-[fadeInUp_0.7s_ease-out]">
        <form method="post" class="space-y-8">
            {% csrf_token %}

            <div>
                <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 mb-6"><i class="fa-solid fa-flask text-emerald-500 mr-2"></i> Soil Nutrients (NPK)</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Nitrogen -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Nitrogen (N)</label>
                        <input type="number" step="any" name="nitrogen" required class="w-full rounded-2xl border-slate-200 bg-slate-50 py-3 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all outline-none" placeholder="Ratio">
                    </div>
                    <!-- Phosphorus -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Phosphorus (P)</label>
                        <input type="number" step="any" name="phosphorus" required class="w-full rounded-2xl border-slate-200 bg-slate-50 py-3 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all outline-none" placeholder="Ratio">
                    </div>
                    <!-- Potassium -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Potassium (K)</label>
                        <input type="number" step="any" name="potassium" required class="w-full rounded-2xl border-slate-200 bg-slate-50 py-3 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all outline-none" placeholder="Ratio">
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 mb-6"><i class="fa-solid fa-cloud-sun text-blue-500 mr-2"></i> Environmental Factors</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <!-- Temperature -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Temperature <span class="text-slate-400 font-normal">(°C)</span></label>
                        <input type="number" step="any" name="temperature" required class="w-full rounded-2xl border-slate-200 bg-slate-50 py-3 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all outline-none">
                    </div>
                    <!-- Humidity -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Humidity <span class="text-slate-400 font-normal">(%)</span></label>
                        <input type="number" step="any" name="humidity" required class="w-full rounded-2xl border-slate-200 bg-slate-50 py-3 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all outline-none">
                    </div>
                    <!-- pH -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Soil pH</label>
                        <input type="number" step="any" name="ph" required class="w-full rounded-2xl border-slate-200 bg-slate-50 py-3 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all outline-none" placeholder="1-14">
                    </div>
                    <!-- Rainfall -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700">Rainfall <span class="text-slate-400 font-normal">(mm)</span></label>
                        <input type="number" step="any" name="rainfall" required class="w-full rounded-2xl border-slate-200 bg-slate-50 py-3 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all outline-none">
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full flex justify-center items-center py-4 px-6 rounded-2xl shadow-lg text-lg font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 focus:outline-none focus:ring-4 focus:ring-emerald-500/30 transform hover:-translate-y-1 transition-all duration-300">
                    <i class="fa-solid fa-microchip mr-3"></i> Analyze & Recommend
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
