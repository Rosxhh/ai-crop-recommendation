{% extends "base.html" %}
{% load i18n %}
{% load socialaccount %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] flex items-center justify-center p-6 bg-slate-50/50 relative overflow-hidden">
    
    <!-- Background Decor -->
    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-agri-50 rounded-full blur-[120px] -z-10 opacity-60"></div>
    <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-emerald-50 rounded-full blur-[100px] -z-10 opacity-50"></div>

    <div class="w-full max-w-lg bg-white rounded-[3rem] shadow-[0_40px_80px_-20px_rgba(0,0,0,0.1)] p-12 text-center border border-slate-100 animate-up relative z-10">
        
        <div class="w-20 h-20 bg-agri-50 text-agri-600 rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-8 shadow-inner">
            <i class="fa-brands fa-google"></i>
        </div>

        <h1 class="text-3xl font-black text-slate-900 mb-4" data-i18n="conn_t">Google Connectivity</h1>
        
        <p class="text-slate-500 font-bold text-sm leading-relaxed mb-10" data-i18n="conn_p">
            You are about to establish a secure link via your Google account. This will synchronize your agricultural data across the ecosystem.
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <button type="submit" class="w-full h-18 bg-gradient-to-r from-agri-600 to-agri-700 rounded-[1.5rem] text-white font-black text-lg shadow-[0_20px_40px_-10px_rgba(34,197,94,0.3)] hover:shadow-[0_24px_48px_-12px_rgba(34,197,94,0.4)] hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-4">
                <span data-i18n="conn_btn">Confirm Connection</span> <i class="fa-solid fa-arrow-right-long text-sm opacity-50"></i>
            </button>
            <a href="/" class="block text-sm font-black text-slate-400 hover:text-slate-600 transition-colors py-2" data-i18n="conn_back">
                Abondon & Go Back
            </a>
        </form>

    </div>
</div>
{% endblock %}
