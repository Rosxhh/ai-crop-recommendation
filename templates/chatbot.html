{% extends 'base.html' %}

{% block content %}
<div class="h-[calc(100vh-80px)] w-full flex overflow-hidden lg:animate-[fade-in-up_0.5s_ease-out] relative">
    
    <!-- Sidebar: ChatGPT Style (Lite Green Theme) -->
    <div id="sidebar" style="background-color: #f0fdf4 !important;" class="w-72 bg-emerald-50 text-slate-900 flex flex-col transition-all duration-300 -translate-x-full fixed top-20 bottom-0 left-0 z-[100] lg:relative lg:translate-x-0 lg:top-0 border-r border-slate-900/10 shadow-2xl lg:shadow-none">
        <div class="p-4">
            <button onclick="startNewChat()" class="w-full flex items-center justify-between gap-3 px-4 py-3 rounded-xl transition-all group font-black btn-3d btn-3d-slate shadow-sm">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-plus text-agri-600 text-sm group-hover:rotate-90 transition-transform"></i>
                    <span class="text-slate-700 uppercase tracking-widest text-[10px]">New Chat</span>
                </div>
            </button>
        </div>

        <!-- Recent Chats List -->
        <div class="flex-1 overflow-y-auto px-1 space-y-1 custom-scrollbar" id="chatHistoryList">
            <div class="px-4 py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">History</div>
            <div class="p-8 text-center text-slate-400 text-xs italic">Loading history...</div>
        </div>

        <div class="px-4 py-2 space-y-2 border-t border-slate-100">
            <a href="/dashboard/" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all group font-black text-[10px] uppercase tracking-widest btn-3d btn-3d-slate shadow-sm">
                <i class="fa-solid fa-arrow-left text-[10px] group-hover:-translate-x-1 transition-transform"></i>
                <span>Return to Hub</span>
            </a>
        </div>

        <!-- Sidebar Footer (Lite Green Theme) -->
        <div class="p-4 border-t border-emerald-100 bg-emerald-200/20">
            <div class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white transition-colors group">
                <div class="w-8 h-8 rounded-lg bg-agri-600 text-white flex items-center justify-center text-sm font-black shadow-lg">VR</div>
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] text-slate-400 truncate font-black uppercase tracking-widest">AgriCore <span class="text-agri-600">Premium</span></p>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-slate-900">
                    <i class="fa-solid fa-angles-left"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Sidebar Overlay for Mobile -->
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[90] hidden lg:hidden transition-opacity"></div>

    <!-- Main Chat Window -->
    <div class="flex-1 flex flex-col min-w-0 relative bg-white overflow-hidden">
        
        <!-- Header -->
        <div class="bg-white px-4 sm:px-8 py-4 border-b border-slate-900/10 flex justify-between items-center relative z-20 shadow-sm">
            <div class="flex items-center gap-2 sm:gap-4">
                <a href="/" class="w-10 h-10 bg-slate-50 shadow-sm rounded-xl flex items-center justify-center text-slate-400 hover:text-agri-600 border border-slate-100 transition-colors" title="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 bg-slate-50 shadow-sm rounded-xl flex items-center justify-center text-slate-400 hover:text-agri-600 border border-slate-100">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="flex items-center gap-2 sm:gap-3">
                    <div class="w-10 h-10 rounded-2xl bg-white text-agri-600 flex items-center justify-center p-1.5 shadow-lg border border-agri-100">
                        <i class="fa-solid fa-robot text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-black text-slate-800 leading-none" data-i18n="brand">AgriCore</h2>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1 hidden sm:flex items-center gap-1.5">
                            <span class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></span> Specialist Online
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <div class="bg-agri-50 px-3 py-1.5 rounded-lg border border-agri-100 hidden md:flex items-center gap-2">
                    <span class="text-[10px] font-black text-agri-600 uppercase tracking-widest">Gemma Core Active</span>
                </div>
                <button onclick="startNewChat()" class="p-2.5 rounded-xl bg-white text-slate-400 hover:text-agri-600 border border-slate-100 shadow-sm transition-all" title="New Chat">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-10 space-y-10 scroll-smooth z-10 custom-scrollbar" id="messages">
            <!-- Messages populated via JS -->
        </div>

        <!-- Input Section -->
        <div class="p-4 sm:p-8 bg-emerald-50 border-t border-slate-900/10 z-20">
            
            <!-- Image Preview -->
            <div id="imagePreviewContainer" class="hidden max-w-4xl mx-auto mb-6">
                <div class="relative inline-block">
                    <img id="imagePreview" src="" class="h-28 w-auto rounded-2xl shadow-2xl ring-4 ring-agri-500/10 border-2 border-white object-cover" alt="Preview">
                    <button onclick="clearImage()" class="absolute -top-3 -right-3 w-8 h-8 bg-black text-white rounded-full flex items-center justify-center shadow-lg border-2 border-white">
                        <i class="fa-solid fa-xmark text-xs font-bold"></i>
                    </button>
                    <input type="hidden" id="imageBase64" value="">
                </div>
            </div>

            <!-- Unified Input Bar -->
            <div class="max-w-4xl mx-auto">
                <div class="relative flex items-end gap-2 sm:gap-4">
                    
                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelection(event)">
                    <button onclick="document.getElementById('imageInput').click()" class="w-11 h-11 sm:w-14 sm:h-14 flex-shrink-0 rounded-2xl flex items-center justify-center transition-all shadow-sm btn-3d btn-3d-slate" title="Attach Image">
                        <i class="fa-solid fa-paperclip text-base sm:text-xl"></i>
                    </button>

                    <div class="flex-1 min-h-[50px] sm:min-h-[56px] bg-white border-2 border-slate-900/10 rounded-[1.5rem] sm:rounded-[2rem] shadow-[0_15px_40px_-10px_rgba(0,0,0,0.05)] focus-within:border-agri-400/50 transition-all flex items-center overflow-hidden">
                        <textarea id="messageInput" rows="1" class="flex-1 min-w-0 bg-transparent border-none px-4 sm:px-6 py-3.5 sm:py-4 outline-none resize-none text-slate-700 font-medium placeholder:text-slate-300 max-h-40 text-sm sm:text-base" placeholder="Ask in any language..."></textarea>
                        
                        <div class="flex items-center gap-0.5 sm:gap-2 pr-1 sm:pr-4 pl-1 border-l border-slate-50">
                            <select id="languageSelect" onchange="onLanguageChange()" class="bg-transparent border-none text-[9px] sm:text-xs font-black uppercase text-slate-400 hover:text-agri-600 outline-none cursor-pointer max-w-[50px] sm:max-w-none">
                                <option value="English">EN</option>
                                <option value="Tamil">TA</option>
                                <option value="Hindi">HI</option>
                                <option value="Telugu">TE</option>
                                <option value="Kannada">KN</option>
                            </select>
                            
                            <button id="voiceToggleBtn" onclick="toggleVoice()" class="w-8 h-8 sm:w-9 sm:h-9 rounded-full flex items-center justify-center text-slate-300 hover:text-agri-500">
                                <i class="fa-solid fa-volume-high text-xs sm:text-base" id="voiceIcon"></i>
                            </button>
                            
                            <button id="micBtn" onclick="toggleSpeech()" class="relative w-10 h-10 sm:w-12 sm:h-12 rounded-full flex flex-col items-center justify-center text-slate-300 hover:text-red-500 transition-all group">
                                <div id="micGlow" class="hidden mic-active-glow"></div>
                                <i class="fa-solid fa-microphone text-base sm:text-lg" id="micIcon"></i>
                                <span id="micLangLabel" class="text-[6px] sm:text-[7px] font-black uppercase mt-0.5 opacity-60">EN</span>
                            </button>
                        </div>
                    </div>

                    <button id="sendBtn" onclick="sendMessage()" class="w-11 h-11 sm:w-14 sm:h-14 flex-shrink-0 bg-agri-600 text-white rounded-2xl flex items-center justify-center hover:bg-agri-700 shadow-xl shadow-agri-600/20 transition-all group">
                        <i class="fa-solid fa-paper-plane text-base sm:text-xl group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    const languageSelect = document.getElementById('languageSelect');
    const chatHistoryList = document.getElementById('chatHistoryList');
    const voiceIcon = document.getElementById('voiceIcon');
    const micIcon = document.getElementById('micIcon');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const imageBase64 = document.getElementById('imageBase64');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
    const imagePreview = document.getElementById('imagePreview');

    const langMap = {
        'English': 'en-IN', 'Tamil': 'ta-IN', 'Hindi': 'hi-IN', 'Telugu': 'te-IN', 'Kannada': 'kn-IN'
    };

    let voiceOutputEnabled = true;
    let voices = [];
    let currentSessionId = "{{ session_id }}";

    // 1. Multilingual Voice & Initialization
    function initVoices() {
        voices = window.speechSynthesis.getVoices();
        console.log(`System voices loaded: ${voices.length}`);
    }
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = initVoices;
    }
    initVoices();

    function onLanguageChange() {
        const lang = languageSelect.value;
        const msgMap = {
            'English': 'Voice mode active. English ready.',
            'Tamil': 'குரல் முறை செயல்படுகிறது. தமிழ் தயார்.',
            'Hindi': 'वॉयस मोड सक्रिय है। हिंदी तैयार है।',
            'Telugu': 'వాయిస్ మోడ్ యాక్టివ్. తెలుగు సిద్ధంగా ఉంది.',
            'Kannada': 'ಧ್ವನಿ ಮೋಡ್ ಸಕ್ರಿಯವಾಗಿದೆ. ಕನ್ನಡ ಸಿದ್ಧವಾಗಿದೆ.'
        };
        
        // Update UI indicator
        const shortCodes = { 'English': 'EN', 'Tamil': 'TA', 'Hindi': 'HI', 'Telugu': 'TE', 'Kannada': 'KN' };
        document.getElementById('micLangLabel').innerText = shortCodes[lang] || 'EN';
        
        speakText(msgMap[lang], lang);
    }

    function speakText(text, lang) {
        if (!voiceOutputEnabled || !window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        
        const clean = text.replace(/[*#_]/g, '').replace(/<[^>]*>/g, '').replace(/\*\*.*?\*\*/g, '');
        const utterance = new SpeechSynthesisUtterance(clean);
        const code = langMap[lang];
        utterance.lang = code;
        utterance.rate = 1.0;
        
        let availableVoices = window.speechSynthesis.getVoices();
        if (availableVoices.length === 0) {
            window.speechSynthesis.onvoiceschanged = () => {
                availableVoices = window.speechSynthesis.getVoices();
                performSpeak(utterance, availableVoices, code, lang);
            };
        } else {
            performSpeak(utterance, availableVoices, code, lang);
        }
    }

    function performSpeak(utterance, voicesList, code, langName) {
        const targetVoice = voicesList.find(v => v.lang === code && (v.name.includes("Google") || v.localService)) || 
                            voicesList.find(v => v.lang === code) ||
                            voicesList.find(v => v.lang.startsWith(code.split('-')[0])) ||
                            voicesList.find(v => v.name.toLowerCase().includes(langName.toLowerCase()));
        
        if (targetVoice) utterance.voice = targetVoice;
        window.speechSynthesis.speak(utterance);
    }

    function toggleVoice() {
        voiceOutputEnabled = !voiceOutputEnabled;
        voiceIcon.className = voiceOutputEnabled ? "fa-solid fa-volume-high" : "fa-solid fa-volume-xmark text-slate-400";
        if (!voiceOutputEnabled) window.speechSynthesis.cancel();
    }

    // 2. Sidebar & Conversation Management
    function toggleSidebar() {
        sidebar.classList.toggle('-translate-x-full');
        sidebarOverlay.classList.toggle('hidden');
    }

    async function loadChatHistory() {
        try {
            const res = await fetch('/chatbot/api/?list_chats=true');
            const data = await res.json();
            chatHistoryList.innerHTML = '<div class="px-4 py-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">History</div>';
            
            data.chats.forEach(chat => {
                const isActive = chat.session_id === currentSessionId;
                const div = document.createElement('div');
                div.className = `mx-2 px-3 py-3 rounded-xl cursor-default flex items-center gap-3 transition-all group/item ${isActive ? 'bg-emerald-100 text-slate-900 font-black' : 'text-slate-600 hover:bg-white/50 hover:text-slate-900'}`;
                
                div.innerHTML = `
                    <div class="flex-1 flex items-center gap-3 cursor-pointer min-w-0" onclick="loadSession('${chat.session_id}')">
                        <i class="fa-regular fa-message text-[10px] opacity-40"></i>
                        <span class="flex-1 truncate text-xs font-medium">${chat.title}</span>
                    </div>
                    <button onclick="deleteSession(event, '${chat.session_id}')" class="opacity-0 group-hover/item:opacity-100 p-2 hover:text-red-500 transition-all text-[10px]" title="Delete Chat">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                chatHistoryList.appendChild(div);
            });
        } catch (e) { console.error("History fail:", e); }
    }

    async function deleteSession(event, sid) {
        event.stopPropagation();
        if (!confirm("Are you sure you want to delete this conversation? 🚜")) return;
        
        try {
            const res = await fetch('/chatbot/api/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
                body: JSON.stringify({ delete_chat: true, session_id: sid })
            });
            const data = await res.json();
            
            if (sid === currentSessionId) {
                currentSessionId = data.session_id;
                messagesEl.innerHTML = '';
                addMessage("This conversation was deleted. How can I help you with a new one? 🌾", false);
            }
            loadChatHistory();
        } catch (e) { console.error("Delete fail:", e); }
    }

    async function startNewChat() {
        const res = await fetch('/chatbot/api/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({ new_chat: true })
        });
        const data = await res.json();
        currentSessionId = data.session_id;
        messagesEl.innerHTML = '';
        addMessage("How can I assist you today? 🌾", false);
        loadChatHistory();
        if (window.innerWidth < 1024 && !sidebar.classList.contains('-translate-x-full')) toggleSidebar();
    }

    async function loadSession(sid) {
        if (sid === currentSessionId) return;
        currentSessionId = sid;
        const res = await fetch(`/chatbot/api/?session_id=${sid}`);
        const data = await res.json();
        messagesEl.innerHTML = '';
        data.history.forEach(m => addMessage(m.content, m.role === 'user', false, m.image_data));
        loadChatHistory();
        if (window.innerWidth < 1024) toggleSidebar();
    }

    // 3. UI Messaging
    function addMessage(text, isUser = false, isTyping = false, imageUrl = null) {
        const div = document.createElement('div');
        div.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'} gap-1 max-w-[92%] sm:max-w-[80%] ${isUser ? 'ml-auto' : ''} animate-fade-in-up group/msg`;
        
        let messageContent = text.replace(/\n/g, '<br>');
        if (text === "[Image Content]") messageContent = "";

        const content = isTyping 
            ? `<div class="bg-white border border-emerald-100 px-6 py-4 rounded-3xl flex items-center gap-3 shadow-sm"><div class="dot-typing"></div></div>`
            : `<div class="relative flex flex-col ${isUser ? 'items-end' : 'items-start'} max-w-full">
                <div class="${isUser ? 'bg-agri-600 text-white shadow-xl' : 'bg-white border border-emerald-100 shadow-md'} px-6 py-4 rounded-3xl rounded-${isUser?'tr':'tl'}-sm font-bold leading-relaxed text-base sm:text-lg overflow-hidden break-words text-slate-900">
                    ${isUser ? `<style>.text-slate-900 { color: white !important; }</style>` : '<style>.text-slate-900 { color: black !important; }</style>'}
                    ${imageUrl ? `<img src="${imageUrl}" class="max-w-full h-auto rounded-xl mb-3 border border-white/20 shadow-sm" alt="Shared Image">` : ''}
                    ${messageContent}
                </div>
                ${!isTyping ? `
                <button class="copy-btn mt-2 opacity-0 group-hover/msg:opacity-100 transition-opacity p-2 text-slate-400 hover:text-agri-600 bg-white shadow-sm border border-slate-100 rounded-lg flex items-center gap-2 text-[10px] font-bold">
                    <i class="fa-regular fa-copy"></i> Copy
                </button>` : ''}
               </div>`;
            
        div.innerHTML = content;
        
        // Attach listener safely (Fixes the "leaking code" bug)
        const btn = div.querySelector('.copy-btn');
        if (btn) {
            btn.onclick = () => copyToClipboard(text, btn);
        }

        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        const image = imageBase64.value;
        if (!text && !image) return;
        
        addMessage(text, true, false, image);
        inputEl.value = ''; inputEl.style.height = 'auto';
        imagePreviewContainer.classList.add('hidden'); imageBase64.value = '';
        
        const typing = addMessage('', false, true);
        
        try {
            const res = await fetch(`/chatbot/api/?session_id=${currentSessionId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
                body: JSON.stringify({ message: text, image: image, language: languageSelect.value })
            });
            const data = await res.json();
            typing.remove();
            
            // Sophisticated Markdown Parser for UNLIMITED responses
            let reply = data.reply
                .replace(/\*\*\*(.*?)\*\*\*/g, '<strong class="font-extrabold text-agri-800 underline">$1</strong>') // Bold Italics
                .replace(/\*\*(.*?)\*\*/g, '<strong class="font-extrabold text-agri-700">$1</strong>') // Bold
                .replace(/^\* (.*$)/gm, '<li class="ml-4 list-disc text-slate-800">$1</li>') // Bullet points
                .replace(/^# (.*$)/gm, '<h1 class="text-2xl font-black text-slate-900 mt-4 mb-2">$1</h1>') // H1
                .replace(/^## (.*$)/gm, '<h2 class="text-xl font-black text-slate-800 mt-3 mb-1">$1</h2>') // H2
                .replace(/`(.*?)`/g, '<code class="bg-slate-100 px-2 py-0.5 rounded text-rose-600 font-mono text-sm">$1</code>'); // Inline code

            addMessage(reply);
            speakText(data.reply, languageSelect.value);
            loadChatHistory();
        } catch (e) { typing.remove(); addMessage("⚠️ System busy. Please try again soon."); }
    }

    // Handlers
    window.addEventListener('DOMContentLoaded', async () => {
        const res = await fetch('/chatbot/api/');
        const data = await res.json();
        currentSessionId = data.session_id;

        // Sync language with global setting
        const globalLang = localStorage.getItem('agri_lang') || 'en';
        const langMapReverse = { 'en': 'English', 'ta': 'Tamil', 'hi': 'Hindi', 'te': 'Telugu', 'kn': 'Kannada' };
        if (langMapReverse[globalLang]) {
            languageSelect.value = langMapReverse[globalLang];
        }
        
        const initialMessage = `{{ initial_message|escapejs }}`;
        
        if (initialMessage && initialMessage.trim() !== "") {
            messagesEl.innerHTML = '';
            inputEl.value = initialMessage;
            sendMessage();
        }
        else if (data.history?.length > 0) {
            messagesEl.innerHTML = '';
            data.history.forEach(m => addMessage(m.content, m.role === 'user', false, m.image_data));
        } else {
             addMessage("Namaste! I am your **AgriCore Master**. 🌾 How can I help you today?", false);
        }
        loadChatHistory();
    });

    window.addEventListener('agriLangChanged', (e) => {
        const langMapReverse = { 'en': 'English', 'ta': 'Tamil', 'hi': 'Hindi', 'te': 'Telugu', 'kn': 'Kannada' };
        if (langMapReverse[e.detail]) {
            languageSelect.value = langMapReverse[e.detail];
            onLanguageChange();
        }
    });

    // Standard Handlers
    inputEl.oninput = () => { inputEl.style.height = 'auto'; inputEl.style.height = inputEl.scrollHeight + 'px'; };
    inputEl.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

    // Paste Support (Universal)
    inputEl.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        let imagePasted = false;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") !== -1) {
                const blob = items[i].getAsFile();
                window.handleImageSelection({ files: [blob] });
                imagePasted = true;
            }
        }
        // If it's a text paste, trigger resize after browser renders it
        if (!imagePasted) {
            setTimeout(() => inputEl.dispatchEvent(new Event('input')), 0);
        }
    });

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const icon = btn.querySelector('i');
            const original = icon.className;
            icon.className = "fa-solid fa-check text-green-500 scale-125 transition-all text-[10px]";
            setTimeout(() => icon.className = original, 2000);
        });
    }

    let recognition;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;

        recognition.onstart = () => {
            const langName = languageSelect.value;
            console.log(`🎤 Mic session started in ${langName}`);
            micIcon.className = "fa-solid fa-stop text-red-500 animate-pulse";
            document.getElementById('micGlow').classList.remove('hidden');
            inputEl.placeholder = `Listening in ${langName}... Speak now! 🌾`;
            inputEl.focus();
        };

        recognition.onresult = (e) => {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) {
                    finalTranscript += e.results[i][0].transcript;
                } else {
                    interimTranscript += e.results[i][0].transcript;
                }
            }

            if (finalTranscript) {
                inputEl.value = finalTranscript;
            } else if (interimTranscript) {
                inputEl.value = interimTranscript;
            }

            inputEl.dispatchEvent(new Event('input'));

            if (finalTranscript) {
                recognition.stop();
                setTimeout(() => {
                    if (inputEl.value.trim() !== "") {
                        sendMessage();
                    }
                }, 700);
            }
        };

        recognition.onerror = (e) => {
            console.error("❌ Mic Error:", e.error);
            micIcon.className = "fa-solid fa-microphone text-lg";
            document.getElementById('micGlow').classList.add('hidden');
            
            const errorMap = {
                'no-speech': "No speech detected. Try again.",
                'not-allowed': "⚠️ Browser blocked mic. Check address bar settings!",
                'network': "Internet error. Voice needs cloud sync.",
                'aborted': "Mic session aborted."
            };
            inputEl.placeholder = errorMap[e.error] || `Mic Error: ${e.error}`;
        };

        recognition.onend = () => {
            console.log("🎤 Mic session ended");
            micIcon.className = "fa-solid fa-microphone text-lg";
            document.getElementById('micGlow').classList.add('hidden');
            if (!inputEl.value) {
                inputEl.placeholder = "Type or ask in your language... (V3.2)";
            }
        };
    }

    function toggleSpeech() { 
        if (!recognition) {
            alert("This browser does not support voice features. Please use Chrome.");
            return; 
        }
        
        try {
            // Force reset to prevent getting stuck
            recognition.stop();
            setTimeout(() => {
                recognition.lang = langMap[languageSelect.value];
                recognition.start();
            }, 100);
        } catch(e) {
            console.log("Mic toggle notice:", e);
            recognition.stop();
        }
    }

    window.handleImageSelection = function(e) {
        const file = e.files ? e.files[0] : (e.target.files ? e.target.files[0] : null);
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (ev) => { imagePreview.src = ev.target.result; imageBase64.value = ev.target.result; imagePreviewContainer.classList.remove('hidden'); };
            reader.readAsDataURL(file);
        }
    };
    function clearImage() { imagePreviewContainer.classList.add('hidden'); imageBase64.value = ''; }
</script>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
    #sidebar .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    .dot-typing { position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #22c55e; animation: dotTyping 1.2s infinite linear; }
    .dot-typing::before, .dot-typing::after { content: ''; display: inline-block; position: absolute; top: 0; width: 6px; height: 6px; border-radius: 5px; background-color: #22c55e; }
    .dot-typing::before { left: -10px; animation: dotTypingBefore 1.2s infinite linear; }
    .dot-typing::after { left: 10px; animation: dotTypingAfter 1.2s infinite linear; }
    @keyframes dotTypingBefore { 0% { opacity: 0; } 33% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes dotTyping { 33% { opacity: 0; } 66% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes dotTypingAfter { 0% { opacity: 0; } 66% { opacity: 0; } 100% { opacity: 1; } }
</style>
    <style>
        #agriSpeakBtn { display: none !important; } /* Hide global FAB on Chat page */
        
        .mic-active-glow {
            position: absolute;
            inset: -4px;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 9999px;
            animation: pulse-red 2s infinite;
            z-index: -1;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 0.8; }

        }
    </style>
</div>
