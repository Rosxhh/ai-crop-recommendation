{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="relative w-full min-h-screen pb-24 bg-transparent overflow-hidden">
  <div class="absolute top-0 left-0 w-1/3 h-1/2 bg-purple-50 rounded-full blur-[120px] -z-10 opacity-60"></div>
  <div class="absolute bottom-0 right-0 w-1/2 h-1/4 bg-blue-50 rounded-full blur-[100px] -z-10 opacity-50"></div>

  <div class="max-w-6xl mx-auto px-4 py-10">
    <a href="/" class="inline-flex items-center px-4 py-2 rounded-xl text-slate-500 hover:text-agri-700 font-black text-[10px] uppercase tracking-widest transition-all btn-3d btn-3d-slate shadow-sm mb-10">
      <i class="fa-solid fa-arrow-left mr-2"></i> Dashboard
    </a>

    <div class="text-center mb-16">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-purple-50 text-purple-600 shadow-lg border border-purple-100 mb-4">
        <i class="fa-solid fa-hand-holding-heart text-2xl"></i>
      </div>
      <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-2">Government <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-agri-600">Scheme Finder</span></h1>
      <p class="text-slate-500 text-lg max-w-2xl mx-auto font-medium">Empowering farmers with direct access to welfare schemes, subsidies, and financial support.</p>
    </div>

    <!-- FILTER BAR -->
    <div class="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-xl p-6 mb-12 flex flex-wrap gap-4 items-center justify-center border border-slate-100">
      <div class="flex items-center gap-2 px-6 py-2 border-r border-slate-100 hidden md:flex">
        <i class="fa-solid fa-filter text-slate-300"></i>
        <span class="text-sm font-black text-slate-700 uppercase tracking-widest">Filter By</span>
      </div>
      <button onclick="filterType('All')" class="type-btn active px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all btn-3d" data-type="All">All Schemes</button>
      <button onclick="filterType('Subsidy')" class="type-btn px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition-all btn-3d btn-3d-slate" data-type="Subsidy">Subsidies</button>
      <button onclick="filterType('Insurance')" class="type-btn px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition-all btn-3d btn-3d-slate" data-type="Insurance">Insurance</button>
      <button onclick="filterType('Financial')" class="type-btn px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition-all btn-3d btn-3d-slate" data-type="Financial">Financial Aid</button>
    </div>

    <div id="schemes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Data injected here -->
    </div>
  </div>
</div>

<style>
  .type-btn.active {
    background: #16a34a;
    border-bottom: 5px solid #14532d;
    color: white;
    box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
    transform: translateY(2px);
    border-bottom-width: 3px;
  }
  .type-btn:active {
    transform: translateY(5px);
    border-bottom-width: 0;
  }
</style>

<script>
  const SCHEMES = [
    { title: 'PM-Kisan Samman Nidhi', type: 'Financial', benefit: '₹6,000 / year', desc: 'Direct income support for landholding farmer families in three equal installments every 4 months.', icon: 'fa-indian-rupee-sign', color: 'bg-emerald-50 text-emerald-600 border-emerald-100' },
    { title: 'PM Fasal Bima Yojana', type: 'Insurance', benefit: 'Crop Loss Coverage', desc: 'Yield-based insurance scheme to stabilize farmer income through insurance support for various natural calamities.', icon: 'fa-shield-halved', color: 'bg-blue-50 text-blue-600 border-blue-100' },
    { title: 'Kisan Credit Card (KCC)', type: 'Financial', benefit: 'Low Interest Loans', desc: 'Provides farmers with timely credit for their cultivation and maintenance needs at concessional interest rates.', icon: 'fa-credit-card', color: 'bg-purple-50 text-purple-600 border-purple-100' },
    { title: 'Soil Health Card Scheme', type: 'Subsidy', benefit: 'Free Soil Testing', desc: 'Helps farmers understand their soil quality and provides precise recommendation on fertilizer usage.', icon: 'fa-vial-circle-check', color: 'bg-amber-50 text-amber-600 border-amber-100' },
    { title: 'PM Krishi Sinchai Yojana', type: 'Subsidy', benefit: 'Irrigation Support', desc: 'Supports more crop per drop through expansion of cultivable area under irrigation and on-farm water efficiency.', icon: 'fa-droplet', color: 'bg-cyan-50 text-cyan-600 border-cyan-100' },
    { title: 'National Agriculture Market', type: 'Direct', benefit: 'Online Trading', desc: 'e-NAM connects existing mandis to create a unified national market for agricultural commodities.', icon: 'fa-house-signal', color: 'bg-indigo-50 text-indigo-600 border-indigo-100' },
    { title: 'MukhyaMantri Solar Pump', type: 'Subsidy', benefit: '75% Discount on Pumps', desc: 'Provides subsidized solar pumps to farmers for irrigation, reducing reliance on expensive diesel/electricity.', icon: 'fa-solar-panel', color: 'bg-orange-50 text-orange-600 border-orange-100' },
    { title: 'Kusum Yojana', type: 'Financial', benefit: 'Solar Income', desc: 'Allows farmers to install solar power plants on their barren lands and sell the power for extra income.', icon: 'fa-sun', color: 'bg-yellow-50 text-yellow-600 border-yellow-100' }
  ];

  function filterType(type) {
    document.querySelectorAll('.type-btn').forEach(btn => {
      if (btn.dataset.type === type) btn.className = "type-btn active px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all btn-3d";
      else btn.className = "type-btn px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest text-slate-500 hover:bg-slate-50 transition-all btn-3d btn-3d-slate";
    });

    const grid = document.getElementById('schemes-grid');
    grid.innerHTML = '';

    const filtered = type === 'All' ? SCHEMES : SCHEMES.filter(s => s.type === type);
    
    filtered.forEach(scheme => {
      const card = document.createElement('div');
      card.className = "bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 hover:shadow-2xl hover:shadow-purple-900/10 hover:-translate-y-1 transition-all flex flex-col h-full";
      card.innerHTML = `
        <div class="flex justify-between items-start mb-6">
          <div class="w-16 h-16 rounded-3xl ${scheme.color} border flex items-center justify-center text-3xl">
            <i class="fa-solid ${scheme.icon}"></i>
          </div>
          <span class="px-4 py-1.5 rounded-full bg-slate-50 text-slate-500 text-[10px] font-black uppercase tracking-widest border border-slate-100">${scheme.type}</span>
        </div>
        
        <h3 class="text-xl font-black text-slate-900 mb-2 leading-tight">${scheme.title}</h3>
        <p class="text-agri-600 font-black text-sm mb-4 flex items-center gap-2">
            <i class="fa-solid fa-gift"></i> Benefit: ${scheme.benefit}
        </p>
        
        <p class="text-slate-500 text-sm font-medium leading-relaxed flex-grow">${scheme.desc}</p>
        
        <div class="mt-8">
            <button class="w-full btn-agri-main py-4 text-xs">Apply Now <i class="fa-solid fa-arrow-right ml-2 text-[10px] opacity-50"></i></button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // Init
  filterType('All');
</script>
{% endblock %}
