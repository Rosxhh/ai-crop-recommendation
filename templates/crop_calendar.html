{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="relative w-full min-h-screen pb-24 bg-transparent overflow-hidden">
  <div class="absolute top-0 left-0 w-1/3 h-1/2 bg-blue-50 rounded-full blur-[120px] -z-10 opacity-70"></div>
  <div class="absolute bottom-0 right-0 w-1/2 h-1/3 bg-agri-50 rounded-full blur-[100px] -z-10 opacity-50"></div>

  <div class="max-w-6xl mx-auto px-4 py-10">
    <a href="/" class="inline-flex items-center text-slate-500 hover:text-agri-700 font-bold text-sm mb-6 transition-colors">
      <i class="fa-solid fa-arrow-left mr-2"></i> Dashboard
    </a>

    <div class="text-center mb-12">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-50 text-blue-600 shadow-lg border border-blue-100 mb-4">
        <i class="fa-solid fa-calendar-days text-2xl"></i>
      </div>
      <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2">Crop Sowing <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-agri-600">Calendar</span></h1>
      <p class="text-slate-500 text-lg max-w-xl mx-auto">Track the ideal planting and harvesting windows for India's major agricultural seasons.</p>
    </div>

    <!-- SEASON SELECTOR -->
    <div class="flex flex-wrap justify-center gap-4 mb-12">
      <button onclick="filterSeason('Kharif')" class="season-btn active px-8 py-3 rounded-2xl font-black text-sm border-2 transition-all shadow-sm" data-season="Kharif">KHARIF (JUNE-OCT)</button>
      <button onclick="filterSeason('Rabi')" class="season-btn px-8 py-3 rounded-2xl font-black text-sm border-2 border-slate-100 text-slate-500 bg-white hover:border-agri-200 transition-all" data-season="Rabi">RABI (NOV-APR)</button>
      <button onclick="filterSeason('Zaid')" class="season-btn px-8 py-3 rounded-2xl font-black text-sm border-2 border-slate-100 text-slate-500 bg-white hover:border-agri-200 transition-all" data-season="Zaid">ZAID (MAR-JUNE)</button>
    </div>

    <div id="calendar-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Cards will be injected by JS -->
    </div>
  </div>
</div>

<style>
  .season-btn.active {
    background: #16a34a;
    color: white;
    border-color: #16a34a;
    box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.3);
  }
</style>

<script>
  const CROP_DATA = [
    { name: 'Rice', season: 'Kharif', sowing: 'June - July', harvesting: 'Oct - Nov', region: 'All India', icon: 'fa-bowl-rice', color: 'bg-emerald-50 text-emerald-600 border-emerald-100' },
    { name: 'Wheat', season: 'Rabi', sowing: 'Oct - Dec', harvesting: 'Feb - April', region: 'North & Central', icon: 'fa-wheat-awn', color: 'bg-amber-50 text-amber-600 border-amber-100' },
    { name: 'Maize', season: 'Kharif', sowing: 'June - July', harvesting: 'Sept - Oct', region: 'All India', icon: 'fa-cubes-stacked', color: 'bg-yellow-50 text-yellow-600 border-yellow-100' },
    { name: 'Cotton', season: 'Kharif', sowing: 'May - July', harvesting: 'Oct - Dec', region: 'Central & South', icon: 'fa-soap', color: 'bg-slate-50 text-slate-600 border-slate-100' },
    { name: 'Sugarcane', season: 'Kharif', sowing: 'Jan - March', harvesting: 'Dec - March', region: 'UP, Maharashtra', icon: 'fa-cane-sugar', color: 'bg-green-50 text-green-600 border-green-100' },
    { name: 'Groundnut', season: 'Kharif', sowing: 'June - July', harvesting: 'Oct - Nov', region: 'Gujarat, Andhra', icon: 'fa-peanut', color: 'bg-orange-50 text-orange-600 border-orange-100' },
    { name: 'Mustard', season: 'Rabi', sowing: 'Oct - Nov', harvesting: 'Feb - March', region: 'North India', icon: 'fa-seedling', color: 'bg-yellow-50 text-yellow-600 border-yellow-100' },
    { name: 'Moong Dal', season: 'Zaid', sowing: 'March - April', harvesting: 'May - June', region: 'Central India', icon: 'fa-plate-wheat', color: 'bg-lime-50 text-lime-600 border-lime-100' },
    { name: 'Cucumber', season: 'Zaid', sowing: 'Feb - March', harvesting: 'April - May', region: 'All India', icon: 'fa-cucumber', color: 'bg-emerald-50 text-emerald-600 border-emerald-100' }
  ];

  function filterSeason(season) {
    // Update UI buttons
    document.querySelectorAll('.season-btn').forEach(btn => {
      if (btn.dataset.season === season) {
        btn.className = "season-btn active px-8 py-3 rounded-2xl font-black text-sm border-2 transition-all shadow-sm";
      } else {
        btn.className = "season-btn px-8 py-3 rounded-2xl font-black text-sm border-2 border-slate-100 text-slate-500 bg-white hover:border-agri-200 transition-all";
      }
    });

    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const filtered = CROP_DATA.filter(c => c.season === season);
    
    filtered.forEach(crop => {
      const card = document.createElement('div');
      card.className = "bg-white rounded-3xl p-6 shadow-xl border border-slate-100 hover:-translate-y-1 transition-all group";
      card.innerHTML = `
        <div class="flex items-center gap-4 mb-6">
          <div class="w-14 h-14 rounded-2xl ${crop.color} border flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
            <i class="fa-solid ${crop.icon}"></i>
          </div>
          <div>
            <h3 class="text-xl font-black text-slate-900">${crop.name}</h3>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">${crop.region}</p>
          </div>
        </div>
        
        <div class="space-y-4">
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500 font-bold"><i class="fa-solid fa-seedling mr-2 text-agri-500"></i> Sowing</span>
            <span class="text-slate-900 font-black">${crop.sowing}</span>
          </div>
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500 font-bold"><i class="fa-solid fa-wheat-awn mr-2 text-amber-500"></i> Harvesting</span>
            <span class="text-slate-900 font-black">${crop.harvesting}</span>
          </div>
        </div>

        <div class="mt-6 pt-6 border-t border-slate-50">
          <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden flex">
            <!-- Simplified progress visualizer -->
            <div class="h-full bg-agri-500" style="width: 100%"></div>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // Init
  filterSeason('Kharif');
</script>
{% endblock %}
